name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  django-tests:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: api.mativiglianco.cloud,testserver
      CORS_ALLOWED_ORIGINS: https://api.mativiglianco.cloud,https://vales.mativiglianco.cloud,https://mativiglianco.github.io
      CSRF_TRUSTED_ORIGINS: https://api.mativiglianco.cloud,https://vales.mativiglianco.cloud,https://mativiglianco.github.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django check
        run: python manage.py check

      - name: Backend tests
        run: python manage.py test statsapp.tests.test_vales_api
